name: CI/CD

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '*'

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, and build
        run: pnpm run ci
        env:
          CLOUDFLARE_ENV: ${{ github.ref_type == 'tag' && 'production' || '' }}

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: application-build-${{ github.sha }}
          path: |
            apps/api/.mastra/output
            apps/web/dist
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  release-tag:
    name: Validate release tag
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    outputs:
      is-semver: ${{ steps.semver.outputs.is-semver }}

    steps:
      - name: Check SemVer tag
        id: semver
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" =~ ^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$ ]]; then
            echo "is-semver=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-semver=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-dev:
    name: Deploy development web to Cloudflare
    needs: ci
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download CI build output
        uses: actions/download-artifact@v4
        with:
          name: application-build-${{ github.sha }}
          path: apps

      - name: Deploy web Worker
        working-directory: apps/web
        run: pnpm exec wrangler deploy --config dist/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-production:
    name: Deploy production web to Cloudflare
    needs:
      - ci
      - release-tag
    if: needs.release-tag.outputs.is-semver == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download CI build output
        uses: actions/download-artifact@v4
        with:
          name: application-build-${{ github.sha }}
          path: apps

      - name: Deploy web Worker
        working-directory: apps/web
        run: pnpm exec wrangler deploy --config dist/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
