<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/dmx_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Trợ lý AI tư vấn máy lạnh theo nhu cầu thật của khách hàng — Điện Máy Xanh"
    />
    <title>Trợ lý mua sắm AI · Điện Máy Xanh</title>
    <script>
      // Runs before first paint so the page never flashes the wrong theme on load.
      (function () {
        try {
          var stored = localStorage.getItem('theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          if (theme === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
